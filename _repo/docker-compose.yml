# Registry-pull variant of docker-compose.yml (see ../_shared/docker-compose.yml
# for the offline/docker-load variant). image is parameterized because a
# pulled image is named/tagged from image.json (e.g.
# osteck/cttc-server:0.0.1, on Docker Hub), not the fixed "cttc-server:latest" a
# local `docker load` restores -- the app sets $CTTC_IMAGE from image.json
# before invoking `docker compose up` with this file (see
# app/lib/server-provision.js). Keep pid/network_mode/volumes in sync by
# hand with the other two compose files.
services:
  cttc-server:
    image: ${CTTC_IMAGE}
    restart: unless-stopped
    pid: host
    network_mode: host
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Lets `docker -H ssh://...` (Add Sources with an ssh:// host) reach a
      # *third* machine, authenticating as whatever key this host's own
      # ssh-agent already has loaded -- no key ever lives in the container.
      # Falls back to /dev/null (a harmless no-op mount) when this host has
      # no SSH_AUTH_SOCK exported, e.g. no agent running: see
      # docs/architecture/remote-server.md.
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
