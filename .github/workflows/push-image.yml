name: Push server image to Docker Hub

# Builds the CTTC server image and pushes it to the registry ref in
# _repo/image.json (currently osteck/cttc-server). Lives here (not in the
# main cut-to-the-chase repo) since this repo is what actually publishes
# releases -- but the Docker build context (app/server/) is source code
# that only exists in cut-to-the-chase, so that repo is checked out
# alongside this one purely to provide it.
#
# Manual for now: trigger from the Actions tab (or `gh workflow run`) on
# this (cttc-release) repo.
on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cttc-release (this repo -- _repo/image.json)
        uses: actions/checkout@v4

      - name: Checkout cut-to-the-chase (app/server/ source)
        uses: actions/checkout@v4
        with:
          repository: oliben67/cut-to-the-chase
          # app/server/Dockerfile only exists on this branch so far --
          # switch to the default branch once it's merged there.
          ref: feature/remote-server-ssh-tunnel
          path: cut-to-the-chase

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PWD }}" | docker login --username osteck@gmail.com --password-stdin

      - name: Build + push the server image
        run: |
          ref="$(node -e "const i = require('./_repo/image.json'); console.log(\`\${i.image}:\${i.tag}\`)")"
          docker build --platform linux/amd64 -t cttc-server:latest cut-to-the-chase/app/server
          docker tag cttc-server:latest "$ref"
          docker push "$ref"
